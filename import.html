function log(msg, type) {
  var el = document.createElement('div');
  el.className = 'status ' + (type || 'info');
  el.textContent = msg;
  document.getElementById('log').appendChild(el);
}

async function startImport() {
  var email = document.getElementById('email').value.trim();
  var pw = document.getElementById('password').value;
  if (!email || !pw) { log('メールアドレスとパスワードを入力してください', 'err'); return; }

  var btn = document.getElementById('importBtn');
  btn.disabled = true;
  btn.textContent = 'インポート中...';

  try {
    log('ログイン中...');
    await auth.signInWithEmailAndPassword(email, pw);
    log('ログイン成功', 'ok');
  } catch(e) {
    log('ログイン失敗: ' + e.message, 'err');
    btn.disabled = false;
    btn.textContent = 'インポート開始';
    return;
  }

  var success = 0;
  var fail = 0;

  for (var i = 0; i < MEMBERS.length; i++) {
    var m = MEMBERS[i];
    try {
      await db.collection('members').add(m);
      success++;
      log((i+1) + '/' + MEMBERS.length + ' ' + m.company + ' ... OK', 'ok');
    } catch(e) {
      fail++;
      log((i+1) + '/' + MEMBERS.length + ' ' + m.company + ' ... 失敗: ' + e.message, 'err');
    }
  }

  log('完了: 成功 ' + success + ' 件 / 失敗 ' + fail + ' 件', success > 0 ? 'ok' : 'err');
  btn.textContent = '完了';
}
