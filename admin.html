<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>メンバー管理 | Builders Base</title>
<style>
  :root {
    --black: #1a1a1a;
    --orange: #e8960c;
    --orange-light: #f5a623;
    --orange-bg: #fff8ee;
    --gray: #6b7280;
    --gray-light: #f3f4f6;
    --gray-border: #e5e7eb;
    --white: #ffffff;
    --red: #dc2626;
    --green: #16a34a;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
    background: var(--gray-light);
    color: var(--black);
    line-height: 1.7;
    -webkit-text-size-adjust: 100%;
  }

  .header {
    background: var(--black);
    padding: 20px 16px;
    text-align: center;
  }

  .header svg { height: 32px; width: auto; }

  .header h1 {
    color: var(--white);
    font-size: 14px;
    font-weight: 500;
    margin-top: 8px;
    letter-spacing: 0.05em;
  }

  .container {
    max-width: 640px;
    margin: 0 auto;
    padding: 16px 16px 40px;
  }

  /* Login */
  .login-screen {
    max-width: 400px;
    margin: 80px auto;
    background: var(--white);
    border-radius: var(--radius);
    padding: 40px 24px;
    border: 1px solid var(--gray-border);
    text-align: center;
  }

  .login-screen h2 {
    font-size: 18px;
    margin-bottom: 24px;
  }

  .login-screen input {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid var(--gray-border);
    border-radius: 8px;
    font-size: 16px;
    font-family: inherit;
    margin-bottom: 16px;
  }

  .login-screen input:focus {
    outline: none;
    border-color: var(--orange);
  }

  .login-error {
    color: var(--red);
    font-size: 13px;
    margin-bottom: 12px;
    display: none;
  }

  /* Buttons */
  .btn {
    display: inline-block;
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    text-align: center;
    text-decoration: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }

  .btn-primary {
    background: var(--orange);
    color: var(--white);
    width: 100%;
  }

  .btn-primary:hover { background: var(--orange-light); }

  .btn-small {
    padding: 6px 14px;
    font-size: 12px;
    border-radius: 6px;
  }

  .btn-edit {
    background: var(--orange-bg);
    color: var(--orange);
    border: 1px solid var(--orange);
  }

  .btn-delete {
    background: #fef2f2;
    color: var(--red);
    border: 1px solid var(--red);
  }

  .btn-add {
    background: var(--orange);
    color: var(--white);
    width: 100%;
    padding: 14px;
    font-size: 16px;
    margin-bottom: 16px;
  }

  .btn-secondary {
    background: var(--gray-light);
    color: var(--black);
    border: 1px solid var(--gray-border);
  }

  .btn-logout {
    background: none;
    color: var(--gray);
    font-size: 13px;
    padding: 8px 16px;
    border: 1px solid var(--gray-border);
    margin-bottom: 16px;
  }

  .member-count {
    font-size: 13px;
    color: var(--gray);
    margin-bottom: 12px;
  }

  /* Member cards (admin list) */
  .member-list { margin-bottom: 24px; }

  .member-row {
    background: var(--white);
    border: 1px solid var(--gray-border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 8px;
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .member-row.hidden-member {
    opacity: 0.5;
    border-style: dashed;
  }

  .member-thumb {
    width: 48px;
    height: 48px;
    border-radius: 8px;
    object-fit: cover;
    flex-shrink: 0;
    background: var(--gray-light);
  }

  .member-thumb-placeholder {
    width: 48px;
    height: 48px;
    border-radius: 8px;
    background: var(--orange);
    color: var(--white);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 800;
    flex-shrink: 0;
  }

  .member-info {
    flex: 1;
    min-width: 0;
  }

  .member-info h3 {
    font-size: 14px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .member-info .meta {
    font-size: 12px;
    color: var(--gray);
  }

  .member-info .tags {
    font-size: 11px;
    color: var(--orange);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .member-badges {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  .badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 700;
    white-space: nowrap;
  }

  .badge-member { background: var(--orange-bg); color: var(--orange); }
  .badge-supporter { background: #f0fdf4; color: var(--green); }
  .badge-hidden { background: #fef2f2; color: var(--red); }
  .badge-visible { background: #f0fdf4; color: var(--green); }

  .member-actions {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }

  /* Form / Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    overflow-y: auto;
    padding: 16px;
  }

  .modal-overlay.active { display: block; }

  .modal {
    background: var(--white);
    border-radius: var(--radius);
    max-width: 520px;
    margin: 24px auto;
    padding: 24px;
  }

  .modal h2 {
    font-size: 18px;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 2px solid var(--gray-light);
  }

  .form-group {
    margin-bottom: 16px;
  }

  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 4px;
    color: var(--black);
  }

  .form-group label .required {
    color: var(--red);
    font-size: 11px;
    margin-left: 4px;
  }

  .form-group input,
  .form-group select {
    width: 100%;
    padding: 10px 12px;
    border: 2px solid var(--gray-border);
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
  }

  .form-group input:focus,
  .form-group select:focus {
    outline: none;
    border-color: var(--orange);
  }

  .form-group .hint {
    font-size: 11px;
    color: var(--gray);
    margin-top: 4px;
  }

  .form-row {
    display: flex;
    gap: 12px;
  }

  .form-row .form-group { flex: 1; }

  .image-upload-area {
    border: 2px dashed var(--gray-border);
    border-radius: 8px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
  }

  .image-upload-area:hover {
    border-color: var(--orange);
    background: var(--orange-bg);
  }

  .image-upload-area.uploading {
    opacity: 0.6;
    pointer-events: none;
  }

  .image-upload-area p {
    font-size: 13px;
    color: var(--gray);
  }

  .image-preview {
    margin-top: 12px;
  }

  .image-preview img {
    max-width: 100%;
    max-height: 160px;
    border-radius: 8px;
    object-fit: cover;
  }

  .image-preview .remove-img {
    display: inline-block;
    margin-top: 8px;
    font-size: 12px;
    color: var(--red);
    cursor: pointer;
    text-decoration: underline;
  }

  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .checkbox-row input[type="checkbox"] {
    width: 20px;
    height: 20px;
    accent-color: var(--orange);
  }

  .checkbox-row label {
    margin-bottom: 0;
    font-size: 14px;
  }

  .form-actions {
    display: flex;
    gap: 12px;
    margin-top: 24px;
  }

  .form-actions .btn { flex: 1; padding: 14px; font-size: 15px; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--black);
    color: var(--white);
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    z-index: 200;
    transition: transform 0.3s;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { background: var(--red); }
  .toast.success { background: var(--green); }

  /* Loading */
  .loading {
    text-align: center;
    padding: 40px;
    color: var(--gray);
    font-size: 14px;
  }

  .spinner {
    display: inline-block;
    width: 24px;
    height: 24px;
    border: 3px solid var(--gray-border);
    border-top-color: var(--orange);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 8px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Confirm dialog */
  .confirm-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    z-index: 300;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .confirm-overlay.active { display: flex; }

  .confirm-box {
    background: var(--white);
    border-radius: var(--radius);
    padding: 24px;
    max-width: 360px;
    width: 100%;
    text-align: center;
  }

  .confirm-box p {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 20px;
  }

  .confirm-box .form-actions { margin-top: 0; }

  .footer {
    text-align: center;
    padding: 24px 16px;
    font-size: 12px;
    color: var(--gray);
  }
</style>
</head>

<!-- Login Screen -->
<div id="loginScreen" class="login-screen">
  <h2>管理画面ログイン</h2>
  <div id="loginError" class="login-error"></div>
  <input type="email" id="emailInput" placeholder="メールアドレス">
  <input type="password" id="passwordInput" placeholder="パスワード" onkeydown="if(event.key==='Enter')doLogin()">
  <button class="btn btn-primary" onclick="doLogin()">ログイン</button>
</div>

<!-- Admin Screen -->
<div id="adminScreen" style="display:none;">
  <div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
      <button class="btn btn-add" style="flex:1; margin-bottom:0; margin-right:8px;" onclick="openAddForm()">+ 新規メンバーを追加</button>
      <button class="btn btn-logout" style="margin-bottom:0;" onclick="doLogout()">ログアウト</button>
    </div>

    <div id="memberCount" class="member-count"></div>
    <div id="memberList" class="member-list">
      <div class="loading">
        <div class="spinner"></div>
        <p>読み込み中...</p>
      </div>
    </div>
  </div>
</div>

<!-- Modal: Add/Edit Form -->
<div id="formModal" class="modal-overlay">
  <div class="modal">
    <h2 id="formTitle">メンバーを追加</h2>

    <div class="form-group">
      <label>会社名 / 屋号<span class="required">必須</span></label>
      <input type="text" id="fCompany" placeholder="例: 株式会社サンプル建設">
    </div>

    <div class="form-group">
      <label>担当者名<span class="required">必須</span></label>
      <input type="text" id="fName" placeholder="例: 山田 太郎">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>会員種別</label>
        <select id="fType">
          <option value="会員">メンバー会員</option>
          <option value="協力会員">協力会員</option>
        </select>
      </div>
      <div class="form-group">
        <label>表示順</label>
        <input type="number" id="fSort" value="9999" min="1">
        <div class="hint">小さいほど上に表示</div>
      </div>
    </div>

    <div class="form-group">
      <label>タグ / 業種</label>
      <input type="text" id="fTags" placeholder="例: 内装, 塗装, リフォーム">
      <div class="hint">カンマ区切りで複数入力</div>
    </div>

    <div class="form-group">
      <label>プロフィール画像</label>
      <div id="imageUploadArea" class="image-upload-area" onclick="document.getElementById('imageFileInput').click()">
        <p>タップして画像を選択</p>
        <p style="font-size:11px; color:#aaa; margin-top:4px;">JPG, PNG (最大5MB)</p>
      </div>
      <input type="file" id="imageFileInput" accept="image/*" style="display:none" onchange="handleImageSelect(this)">
      <div id="imagePreview" class="image-preview" style="display:none;">
        <img id="previewImg" src="">
        <span class="remove-img" onclick="removeImage()">画像を削除</span>
      </div>
      <div style="margin-top:8px; text-align:center; font-size:12px; color:var(--gray);">または</div>
      <input type="text" id="fImgUrl" placeholder="画像URLを直接入力" style="margin-top:8px;" oninput="handleUrlInput(this.value)">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>電話番号</label>
        <input type="tel" id="fPhone" placeholder="例: 03-1234-5678">
      </div>
      <div class="form-group">
        <label>WebサイトURL</label>
        <input type="url" id="fUrl" placeholder="https://...">
      </div>
    </div>

    <div class="form-group">
      <div class="checkbox-row">
        <input type="checkbox" id="fVisible" checked>
        <label for="fVisible">サイトに表示する</label>
      </div>
    </div>

    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closeForm()">キャンセル</button>
      <button class="btn btn-primary" id="formSubmitBtn" onclick="submitForm()">追加する</button>
    </div>
  </div>
</div>

<!-- Confirm Dialog -->
<div id="confirmOverlay" class="confirm-overlay">
  <div class="confirm-box">
    <p id="confirmMessage">このメンバーを削除しますか？</p>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closeConfirm()">キャンセル</button>
      <button class="btn btn-delete" id="confirmBtn" onclick="confirmAction()">削除する</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<div class="footer">
  <p>Builders Base【ビルダーズベース】メンバー管理</p>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

<script>
// === Firebase Init ===
firebase.initializeApp({
  apiKey: "AIzaSyBJ5TFzohZX31DPVOMejUEamN2ytJzCwMI",
  authDomain: "buildersbase-59d77.firebaseapp.com",
  projectId: "buildersbase-59d77",
  storageBucket: "buildersbase-59d77.firebasestorage.app",
  messagingSenderId: "486430842362",
  appId: "1:486430842362:web:af92e17459e2a32e8d1843"
});

var auth = firebase.auth();
var db = firebase.firestore();
var storage = firebase.storage();

var MEMBERS = [];
var editingDocId = null;
var uploadedImgUrl = '';
var pendingConfirmAction = null;

// === Auth ===
auth.onAuthStateChanged(function(user) {
  if (user) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminScreen').style.display = 'block';
    loadMembers();
  } else {
    document.getElementById('loginScreen').style.display = 'block';
    document.getElementById('adminScreen').style.display = 'none';
  }
});

async function doLogin() {
  var email = document.getElementById('emailInput').value.trim();
  var pw = document.getElementById('passwordInput').value;
  if (!email || !pw) return;

  var errorEl = document.getElementById('loginError');
  errorEl.style.display = 'none';

  try {
    await auth.signInWithEmailAndPassword(email, pw);
  } catch (err) {
    errorEl.textContent = 'メールアドレスまたはパスワードが正しくありません';
    errorEl.style.display = 'block';
  }
}

function doLogout() {
  auth.signOut();
}

// === Load Members ===
async function loadMembers() {
  document.getElementById('memberList').innerHTML = '<div class="loading"><div class="spinner"></div><p>読み込み中...</p></div>';
  try {
    var snapshot = await db.collection('members').orderBy('sort').get();
    MEMBERS = [];
    snapshot.forEach(function(doc) {
      var d = doc.data();
      d.id = doc.id;
      MEMBERS.push(d);
    });
    renderMembers();
  } catch (err) {
    console.error(err);
    document.getElementById('memberList').innerHTML = '<div class="loading"><p>データの取得に失敗しました</p></div>';
  }
}

function renderMembers() {
  var container = document.getElementById('memberList');
  var countEl = document.getElementById('memberCount');
  var visibleCount = MEMBERS.filter(function(m) { return m.visible; }).length;
  countEl.textContent = '全 ' + MEMBERS.length + ' 件（表示中: ' + visibleCount + ' 件）';

  if (MEMBERS.length === 0) {
    container.innerHTML = '<div class="loading"><p>メンバーが登録されていません</p></div>';
    return;
  }

  var html = '';
  for (var i = 0; i < MEMBERS.length; i++) {
    var m = MEMBERS[i];
    var hiddenClass = m.visible ? '' : ' hidden-member';
    var thumbHtml = m.img
      ? '<img class="member-thumb" src="' + escapeHtml(m.img) + '" onerror="this.style.display=\'none\'">'
      : '<div class="member-thumb-placeholder">' + escapeHtml((m.company || '?').charAt(0)) + '</div>';

    var typeBadge = m.type === '協力会員'
      ? '<span class="badge badge-supporter">協力会員</span>'
      : '<span class="badge badge-member">メンバー</span>';

    var visBadge = m.visible
      ? '<span class="badge badge-visible">表示中</span>'
      : '<span class="badge badge-hidden">非表示</span>';

    var tagsStr = Array.isArray(m.tags) ? m.tags.join(', ') : (m.tags || '');

    html += '<div class="member-row' + hiddenClass + '">'
      + thumbHtml
      + '<div class="member-info">'
      + '<h3>' + escapeHtml(m.company) + '</h3>'
      + '<div class="meta">' + escapeHtml(m.name) + ' ・ 順: ' + (m.sort || 9999) + '</div>'
      + '<div class="tags">' + escapeHtml(tagsStr) + '</div>'
      + '</div>'
      + '<div class="member-badges">' + typeBadge + visBadge + '</div>'
      + '<div class="member-actions">'
      + '<button class="btn btn-small btn-edit" onclick="openEditForm(' + i + ')">編集</button>'
      + '<button class="btn btn-small btn-delete" onclick="confirmDelete(' + i + ')">削除</button>'
      + '</div>'
      + '</div>';
  }
  container.innerHTML = html;
}

// === Form ===
function openAddForm() {
  editingDocId = null;
  document.getElementById('formTitle').textContent = 'メンバーを追加';
  document.getElementById('formSubmitBtn').textContent = '追加する';
  clearForm();
  document.getElementById('fVisible').checked = true;
  document.getElementById('formModal').classList.add('active');
}

function openEditForm(index) {
  var m = MEMBERS[index];
  editingDocId = m.id;
  document.getElementById('formTitle').textContent = 'メンバーを編集';
  document.getElementById('formSubmitBtn').textContent = '更新する';

  document.getElementById('fCompany').value = m.company || '';
  document.getElementById('fName').value = m.name || '';
  document.getElementById('fType').value = m.type || '会員';
  document.getElementById('fSort').value = m.sort || 9999;
  document.getElementById('fTags').value = Array.isArray(m.tags) ? m.tags.join(', ') : (m.tags || '');
  document.getElementById('fPhone').value = m.phone || '';
  document.getElementById('fUrl').value = m.url || '';
  document.getElementById('fVisible').checked = m.visible !== false;

  uploadedImgUrl = '';
  if (m.img) {
    document.getElementById('fImgUrl').value = m.img;
    document.getElementById('previewImg').src = m.img;
    document.getElementById('imagePreview').style.display = 'block';
    document.getElementById('imageUploadArea').style.display = 'none';
  } else {
    document.getElementById('fImgUrl').value = '';
    document.getElementById('imagePreview').style.display = 'none';
    document.getElementById('imageUploadArea').style.display = 'block';
  }

  document.getElementById('formModal').classList.add('active');
}

function closeForm() {
  document.getElementById('formModal').classList.remove('active');
  clearForm();
}

function clearForm() {
  document.getElementById('fCompany').value = '';
  document.getElementById('fName').value = '';
  document.getElementById('fType').value = '会員';
  document.getElementById('fSort').value = '9999';
  document.getElementById('fTags').value = '';
  document.getElementById('fPhone').value = '';
  document.getElementById('fUrl').value = '';
  document.getElementById('fImgUrl').value = '';
  document.getElementById('fVisible').checked = true;
  uploadedImgUrl = '';
  document.getElementById('imagePreview').style.display = 'none';
  document.getElementById('imageUploadArea').style.display = 'block';
  document.getElementById('imageFileInput').value = '';
}

async function submitForm() {
  var company = document.getElementById('fCompany').value.trim();
  var name = document.getElementById('fName').value.trim();

  if (!company) { showToast('会社名を入力してください', 'error'); return; }
  if (!name) { showToast('担当者名を入力してください', 'error'); return; }

  var imgValue = uploadedImgUrl || document.getElementById('fImgUrl').value.trim();
  var tagsStr = document.getElementById('fTags').value.trim();
  var tagsArr = tagsStr ? tagsStr.split(',').map(function(t) { return t.trim(); }).filter(function(t) { return t; }) : [];

  var memberData = {
    company: company,
    name: name,
    type: document.getElementById('fType').value,
    sort: parseInt(document.getElementById('fSort').value) || 9999,
    tags: tagsArr,
    img: imgValue,
    phone: document.getElementById('fPhone').value.trim(),
    url: document.getElementById('fUrl').value.trim(),
    visible: document.getElementById('fVisible').checked
  };

  var btn = document.getElementById('formSubmitBtn');
  btn.disabled = true;
  btn.textContent = '保存中...';

  try {
    if (editingDocId) {
      await db.collection('members').doc(editingDocId).update(memberData);
      showToast('更新しました', 'success');
    } else {
      await db.collection('members').add(memberData);
      showToast('追加しました', 'success');
    }
    closeForm();
    loadMembers();
  } catch (err) {
    console.error(err);
    showToast('保存に失敗しました: ' + err.message, 'error');
  }

  btn.disabled = false;
  btn.textContent = editingDocId ? '更新する' : '追加する';
}

// === Image Upload ===
async function handleImageSelect(input) {
  if (!input.files || !input.files[0]) return;
  var file = input.files[0];

  if (file.size > 5 * 1024 * 1024) {
    showToast('ファイルサイズは5MB以下にしてください', 'error');
    return;
  }

  var area = document.getElementById('imageUploadArea');
  area.classList.add('uploading');
  area.querySelector('p').textContent = 'アップロード中...';

  try {
    var filename = 'members/' + Date.now() + '_' + file.name;
    var ref = storage.ref(filename);
    await ref.put(file);
    var url = await ref.getDownloadURL();

    uploadedImgUrl = url;
    document.getElementById('previewImg').src = url;
    document.getElementById('imagePreview').style.display = 'block';
    area.style.display = 'none';
    document.getElementById('fImgUrl').value = url;
    showToast('画像をアップロードしました', 'success');
  } catch (err) {
    console.error(err);
    showToast('画像アップロードに失敗しました', 'error');
  }

  area.classList.remove('uploading');
  area.querySelector('p').textContent = 'タップして画像を選択';
}

function handleUrlInput(val) {
  if (val && val.indexOf('http') === 0) {
    document.getElementById('previewImg').src = val;
    document.getElementById('imagePreview').style.display = 'block';
    document.getElementById('imageUploadArea').style.display = 'none';
    uploadedImgUrl = '';
  }
}

function removeImage() {
  uploadedImgUrl = '';
  document.getElementById('fImgUrl').value = '';
  document.getElementById('imagePreview').style.display = 'none';
  document.getElementById('imageUploadArea').style.display = 'block';
  document.getElementById('imageFileInput').value = '';
}

// === Delete ===
function confirmDelete(index) {
  var m = MEMBERS[index];
  document.getElementById('confirmMessage').textContent = '「' + m.company + '」を削除しますか？';
  pendingConfirmAction = function() { deleteMember(m.id); };
  document.getElementById('confirmOverlay').classList.add('active');
}

function closeConfirm() {
  document.getElementById('confirmOverlay').classList.remove('active');
  pendingConfirmAction = null;
}

function confirmAction() {
  if (pendingConfirmAction) pendingConfirmAction();
  closeConfirm();
}

async function deleteMember(docId) {
  try {
    await db.collection('members').doc(docId).delete();
    showToast('削除しました', 'success');
    loadMembers();
  } catch (err) {
    console.error(err);
    showToast('削除に失敗しました', 'error');
  }
}

// === Toast ===
function showToast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + (type || '') + ' show';
  setTimeout(function() { el.className = 'toast'; }, 3000);
}

// === Util ===
function escapeHtml(str) {
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
</script>

</body>
</html>
